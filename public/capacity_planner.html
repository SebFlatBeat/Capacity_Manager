<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capacity Planner Agile</title>

<link rel="icon" href="assets/images/icone_logo.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
    :root {
        --glass-bg: rgba(255, 255, 255, 0.75);
        --glass-border: rgba(203, 213, 225, 0.6);
        --body-bg: #f8fafc;
        --primary-gradient: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
        --text-main: #0f172a;
        --text-muted: #475569;
        --card-bg: #ffffff;
        --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        --accent: #2563eb;
        --accent-muted: #dbeafe;
    }

    .dark {
        --glass-bg: rgba(30, 41, 59, 0.85);
        --glass-border: rgba(51, 65, 85, 0.5);
        --body-bg: #020617;
        --text-main: #f1f5f9;
        --text-muted: #94a3b8;
        --card-bg: #0f172a;
        --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
        --accent: #60a5fa;
        --accent-muted: rgba(59, 130, 246, 0.15);
    }

    body {
        font-family: 'Inter', sans-serif;
        background-color: var(--body-bg);
        background-image: 
            radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.03) 0px, transparent 50%),
            radial-gradient(at 100% 0%, rgba(124, 58, 237, 0.03) 0px, transparent 50%);
        background-attachment: fixed;
        min-height: 100vh;
        color: var(--text-main);
        transition: background-color 0.3s ease, color 0.3s ease;
    }

    .dark body {
        background-image: 
            radial-gradient(at 20% 0%, rgba(59, 130, 246, 0.05) 0px, transparent 40%),
            radial-gradient(at 80% 0%, rgba(139, 92, 246, 0.05) 0px, transparent 40%);
    }

    /* Professional Glass */
    .glass-card {
        background: var(--card-bg);
        backdrop-filter: blur(12px) saturate(150%);
        -webkit-backdrop-filter: blur(12px) saturate(150%);
        border: 1px solid var(--glass-border);
        box-shadow: var(--card-shadow);
        transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.3s ease;
    }

    .dark .glass-card {
        background: var(--glass-bg);
    }

    .glass-nav {
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--glass-border);
        z-index: 50;
    }

    .glass-input {
        background: var(--card-bg);
        border: 1px solid var(--glass-border);
        color: var(--text-main);
        transition: all 0.2s ease;
    }

    .dark .glass-input {
        background: rgba(15, 23, 42, 0.6);
    }

    .glass-input:focus {
        background: white;
        border-color: var(--accent);
        box-shadow: 0 0 0 4px var(--accent-muted);
    }
    
    .dark .glass-input:focus {
        background: rgba(30, 41, 59, 0.9);
    }

    /* Tabular numbers for precise data */
    .num-align {
        font-family: 'Inter', monospace;
        font-variant-numeric: tabular-nums;
    }

    /* Bento Grid Effects */
    .bento-item:hover {
        transform: translateY(-2px);
        box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.15);
    }
    
    .dark .bento-item:hover {
        background: rgba(255, 255, 255, 0.03);
    }

    /* Modern Table Styles */
    .sticky-col {
        position: sticky;
        left: 0;
        background: var(--card-bg);
        backdrop-filter: blur(8px);
        z-index: 10;
        box-shadow: 4px 0 10px -4px rgba(0,0,0,0.1);
    }
    
    .dark .sticky-col {
        background: var(--card-bg);
    }
    
    .sticky-header {
        position: sticky;
        top: 0;
        z-index: 20;
        background: var(--body-bg);
        opacity: 0.98;
        backdrop-filter: blur(8px);
    }

    .btn-gradient {
        background: var(--primary-gradient);
        color: white;
        box-shadow: 0 4px 15px -3px rgba(37, 99, 235, 0.3);
        transition: all 0.2s ease;
    }
    .btn-gradient:hover {
        filter: brightness(1.1);
        transform: translateY(-1px);
        box-shadow: 0 8px 20px -3px rgba(37, 99, 235, 0.4);
    }

    .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: var(--glass-border); border-radius: 10px; }

    /* Text Gradient */
    .text-gradient {
        background: var(--primary-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    /* Animations */
    .fade-in-up {
        animation: fadeInUp 0.5s ease-out forwards;
    }
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Accessibility focus */
    :focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
    }
</style>
</head>
<body class="font-sans selection:bg-[var(--accent)] selection:text-white">

<div id="root"></div>

<script type="text/babel">
    /**
     * =========================================================================
     * 🚀 CAPACITY PLANNER AGILE - CORE APPLICATION
     * =========================================================================
     * 
     * @description Application de planification capacitaire pour trains SAFe / Agile.
     * @version     4.2.0 "Next-Gen"
     * @stack       React 18 (Babel Standalone), TailwindCSS 3, FontAwesome 6.
     * @architecture Single Page Application (SPA) intégrée dans un fichier HTML.
     * 
     * SOMMAIRE DU FICHIER :
     * 1. CONFIGURATION & DESIGN SYSTEM (CSS)
     * 2. UTILS & BUSINESS LOGIC (Dates, Jours fériés, Formats)
     * 3. COMPONENTS ATOMIQUES (UI/UX Reusable components)
     * 4. MODULES FONCTIONNELS (Charts, Settings, Login)
     * 5. ENGINE : MOTEUR DE CALCUL CAPACITAIRE (Le coeur de l'app)
     * 6. NAVIGATION & RBAC (Matrice des droits)
     * 7. RENDU DES VUES (Dashboard, Teams, Config)
     * =========================================================================
     */

	const { useState, useMemo, useEffect, useCallback } = React;
	
	/**
     * 🔐 MODULE : ÉCRAN DE CONNEXION (LOGIN)
     * Gère l'authentification et l'initialisation de la session utilisateur.
     */
    const LoginScreen = ({ onLogin, darkMode, setDarkMode }) => {
        const [credentials, setCredentials] = useState({ login: '', mot_de_passe: '' });
        const [errors, setErrors] = useState({ global: '', login: '', mot_de_passe: '' });
        const [isLoading, setIsLoading] = useState(false);
        const [showPassword, setShowPassword] = useState(false);

        const handleSubmit = (e) => {
            e.preventDefault();
            let newErrors = { global: '', login: '', mot_de_passe: '' };
            let hasError = false;
            if (!credentials.login.trim()) { newErrors.login = "Requis"; hasError = true; }
            if (!credentials.mot_de_passe) { newErrors.mot_de_passe = "Requis"; hasError = true; }
            setErrors(newErrors);
            if (hasError) return;
            setIsLoading(true);
            fetch('api_login.php', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(credentials) })
            .then(res => res.json()).then(data => {
                setIsLoading(false);
                if (data.status === 'success') onLogin(data.user);
                else setErrors({ ...newErrors, global: String(data.message || "Accès refusé.") });
            }).catch(() => { setIsLoading(false); setErrors({ ...newErrors, global: "Erreur serveur." }); });
        };

        return (
            <div className="min-h-screen flex flex-col justify-center items-center p-6 relative overflow-hidden transition-colors duration-500 bg-[var(--body-bg)]">
                {/* Décorations d'arrière-plan floues */}
                <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-[var(--accent)]/10 rounded-full blur-[120px] pointer-events-none"></div>
                <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-500/10 rounded-full blur-[120px] pointer-events-none"></div>

                {/* Bouton Theme Toggle (Login) */}
                <button 
                    onClick={() => setDarkMode(!darkMode)}
                    className="absolute top-8 right-8 w-12 h-12 flex items-center justify-center rounded-2xl bg-[var(--card-bg)] border border-[var(--glass-border)] text-[var(--text-main)] hover:scale-110 transition-all z-20 shadow-xl"
                >
                    <i className={`fa-solid ${darkMode ? 'fa-sun' : 'fa-moon'} text-xl`}></i>
                </button>

                <div className="w-full max-w-[440px] glass-card rounded-[40px] p-10 md:p-14 floating relative z-10">
                    <div className="text-center mb-12">
                        <div className="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-[var(--accent-muted)] shadow-inner mb-6 border border-[var(--glass-border)] p-4">
                            <img src="assets/images/logo.png" alt="" className="w-full h-full object-contain dark:brightness-200" />
                        </div>
                        <h1 className="text-4xl font-[900] text-[var(--text-main)] tracking-tighter mb-2">
                            Capacity <span className="text-gradient">Planner</span>
                        </h1>
                        <p className="text-[var(--text-muted)] font-medium text-sm tracking-wide uppercase">Workspace Authentication</p>
                    </div>
                    
                    <form onSubmit={handleSubmit} noValidate className="space-y-8">
                        {errors.global && (
                            <div className="bg-red-500/10 text-red-500 p-4 rounded-2xl text-xs font-black flex items-center gap-3 border border-red-500/20 animate-pulse">
                                <i className="fa-solid fa-triangle-exclamation"></i> {errors.global}
                            </div>
                        )}
                        
                        <div className="space-y-6">
                            <div className="group">
                                <label className="block text-[10px] font-black text-[var(--text-muted)] uppercase tracking-[0.2em] mb-2 ml-1">Identity</label>
                                <div className="relative">
                                    <input 
                                        type="text" autoFocus autoComplete="username" autoCapitalize="none" spellCheck="false"
                                        value={credentials.login} 
                                        onChange={e => setCredentials({...credentials, login: e.target.value})}
                                        className="w-full glass-input rounded-2xl px-5 py-4 font-bold placeholder:text-[var(--text-muted)] outline-none transition-all" 
                                        placeholder="Username"
                                    />
                                </div>
                            </div>

                            <div className="group">
                                <label className="block text-[10px] font-black text-[var(--text-muted)] uppercase tracking-[0.2em] mb-2 ml-1">Credentials</label>
                                <div className="relative">
                                    <input 
                                        type={showPassword ? "text" : "password"} autoComplete="current-password"
                                        value={credentials.mot_de_passe} 
                                        onChange={e => setCredentials({...credentials, mot_de_passe: e.target.value})}
                                        className="w-full glass-input rounded-2xl px-5 py-4 font-bold placeholder:text-[var(--text-muted)] outline-none transition-all" 
                                        placeholder="••••••••"
                                    />
                                    <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 flex items-center justify-center text-[var(--text-muted)] hover:text-[var(--accent)] transition-colors">
                                        <i className={`fa-solid ${showPassword ? 'fa-eye-slash' : 'fa-eye'}`}></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <button type="submit" disabled={isLoading} className="w-full btn-gradient text-white font-black py-5 rounded-2xl transition-all flex justify-center items-center gap-3 text-sm tracking-widest uppercase mt-4">
                            {isLoading ? <i className="fa-solid fa-circle-notch fa-spin"></i> : <i className="fa-solid fa-shield-check"></i>}
                            Authenticate
                        </button>
                    </form>
                </div>
                
                <p className="mt-12 text-[var(--text-muted)] text-[10px] font-bold uppercase tracking-[0.3em] relative z-10">
                    &copy; 2026 Enterprise Agile Framework
                </p>
            </div>
        );
    };

	/**
     * =========================================================================
     * 🛠️ BLOC 1 : DONNÉES PAR DÉFAUT & COMPOSANTS VISUELS DE BASE
     * =========================================================================
     */
	const mockDatabase = {
		'PI 2026.2': { config: { name: 'PI 2026.2', startDate: '2026-03-30', endDate: '2026-06-26', iterations: 4, daysPerIteration: 15 }, teams: [] }
	};

	const Card = ({ children, className = "" }) => <div className={`glass-card rounded-2xl bento-item ${className}`}>{children}</div>;
	
	const Badge = ({ children, variant = "default", className = "" }) => {
		const variants = { 
            default: "bg-[var(--accent-muted)] text-[var(--text-main)] border-[var(--glass-border)]", 
            success: "bg-emerald-100 dark:bg-emerald-900/30 text-emerald-800 dark:text-emerald-400 border-emerald-200 dark:border-emerald-800", 
            danger: "bg-red-100 dark:bg-red-900/30 text-red-800 dark:text-red-400 border-red-200 dark:border-red-800" 
        };
		return <span className={`px-2.5 py-0.5 rounded-full text-xs font-semibold border ${variants[variant]} ${className}`}>{children}</span>;
	};

	const Input = ({ className = "", ...props }) => <input className={`flex h-9 w-full rounded-md border border-[var(--glass-border)] dark:border-slate-700 bg-transparent px-3 py-1 text-sm shadow-sm transition-all placeholder:text-[var(--text-muted)] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--accent)] focus-visible:border-[var(--accent)] focus-visible:ring-offset-1 dark:focus-visible:ring-offset-slate-900 ${className}`} {...props} />;

	/**
     * =========================================================================
     * 📅 BLOC 2 : MODULE "SPRINTS" (Configuration des dates du PI)
     * =========================================================================
     */
	const SettingsModule = ({ activePI, holidays, onShowToast, isArchived, handleStartPI, handleClosePI, isAppAdmin, activePIStatus, sprints, fetchSprints }) => {
		const [formData, setFormData] = useState({ 
            pi_code: activePI, numero_iteration: 1, date_debut: '', date_fin: '', nb_jours: 0 
        });

		useEffect(() => { setFormData(prev => ({ ...prev, pi_code: activePI })); }, [activePI]);

        useEffect(() => {
            if (formData.date_debut && formData.date_fin) {
                const days = getWorkingDays(formData.date_debut, formData.date_fin, 'France', holidays);
                setFormData(prev => ({ ...prev, nb_jours: days }));
            }
        }, [formData.date_debut, formData.date_fin, holidays]);

		const handleSubmit = (e) => {
			e.preventDefault();
			fetch('api_sprints.php', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(formData) })
			.then(res => res.json())
			.then(response => {
				if (response.status === 'success') { onShowToast('success', 'Sprint enregistré', 'Le sprint a été ajouté avec succès.'); fetchSprints(); } 
				else { onShowToast('error', 'Erreur', response.message); }
			});
		};

        // Filtrage robuste des sprints pour ce PI
        const filteredSprints = useMemo(() => {
            if (!Array.isArray(sprints)) return [];
            
            // On ne garde que les chiffres et les points pour la comparaison
            const normalize = (str) => String(str || '').replace(/[^0-9.]/g, '');
            const aCode = normalize(activePI);
            
            const result = sprints.filter(s => {
                const sCode = normalize(s.pi_code);
                const isMatch = sCode === aCode && aCode !== '';
                return isMatch;
            }).sort((a, b) => Number(a.numero_iteration) - Number(b.numero_iteration));
            
            return result;
        }, [sprints, activePI]);

		return (
			<div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {/* ... (Bandeau archive inchangé) */}
                {isArchived && (
                    <div className="md:col-span-2 bg-slate-100 border-2 border-slate-300 p-4 rounded-2xl flex items-center gap-4 shadow-inner mb-2">
                        <div className="w-12 h-12 rounded-full bg-slate-200 text-slate-500 flex items-center justify-center text-xl shadow-sm">
                            <i className="fa-solid fa-box-archive"></i>
                        </div>
                        <div>
                            <p className="font-black text-slate-800 uppercase tracking-tight">PI ARCHIVÉ (LECTURE SEULE)</p>
                            <p className="text-xs text-slate-500 font-bold">Ce Program Increment est clos. Les modifications sont désactivées pour préserver l'historique.</p>
                        </div>
                    </div>
                )}

				<Card className={`p-6 ${isArchived ? 'opacity-75 grayscale-[0.5]' : ''}`}>
					<h3 className="text-lg font-bold text-[var(--text-main)] dark:text-white mb-4">Ajouter un Sprint</h3>
					<form onSubmit={handleSubmit} className="space-y-4">
						<div className="grid grid-cols-2 gap-4">
                            <div><label className="block text-sm font-medium text-[var(--text-muted)] dark:text-slate-300">Code du PI</label><Input type="text" value={formData.pi_code} disabled className="bg-[var(--body-bg)] dark:bg-slate-800 text-[var(--text-muted)] dark:text-[var(--text-muted)]" /></div>
						    <div><label className="block text-sm font-medium text-[var(--text-muted)] dark:text-slate-300">Numéro Itération</label><Input type="number" min="1" value={formData.numero_iteration} onChange={e => setFormData({...formData, numero_iteration: e.target.value})} required disabled={isArchived} /></div>
                        </div>
						<div className="grid grid-cols-2 gap-4">
							<div><label className="block text-sm font-medium text-[var(--text-muted)] dark:text-slate-300">Date de début</label><Input type="date" value={formData.date_debut} onChange={e => setFormData({...formData, date_debut: e.target.value})} required className="cursor-pointer dark:color-scheme-dark" disabled={isArchived} /></div>
							<div><label className="block text-sm font-medium text-[var(--text-muted)] dark:text-slate-300">Date de fin</label><Input type="date" value={formData.date_fin} onChange={e => setFormData({...formData, date_fin: e.target.value})} required className="cursor-pointer dark:color-scheme-dark" disabled={isArchived} /></div>
						</div>
                        
                        <div className="bg-[var(--accent-muted)] dark:bg-[var(--accent)]/30 p-4 rounded-lg border border-[var(--glass-border)] dark:border-[var(--glass-border)] flex items-start gap-3">
                            <i className="fa-solid fa-calculator text-[var(--accent)] dark:text-[var(--accent)] mt-1"></i>
                            <div>
                                <p className="text-sm font-bold text-[var(--text-main)] dark:text-[var(--accent)]">Gisement calculé : <span className="text-xl">{formData.nb_jours}</span> jours ouvrés</p>
                                <p className="text-xs text-[var(--accent)] dark:text-[var(--accent)] mt-0.5 flex items-center gap-1">
                                    Défalqué des week-ends et jours fériés 
                                    <i className="fa-solid fa-circle-info cursor-help text-[var(--accent)] hover:text-[var(--text-main)] transition-colors" title={`Calcul basé sur les ${holidays.length} jours fériés enregistrés dans l'onglet Config.`}></i>
                                </p>
                            </div>
                        </div>
						<button type="submit" className="w-full btn-gradient text-white font-bold py-2.5 px-4 rounded-md transition-colors shadow-sm mt-2 disabled:opacity-50 disabled:cursor-not-allowed" disabled={isArchived}>Enregistrer le Sprint</button>
					</form>
				</Card>

				<Card className="p-6">
					<h3 className="text-lg font-bold text-[var(--text-main)] dark:text-white mb-4">Calendrier des Sprints (BDD)</h3>
					<div className="overflow-x-auto custom-scrollbar pb-2 max-h-[300px]">
						{filteredSprints.length === 0 ? (
                            <div className="text-center py-10 bg-[var(--body-bg)] rounded-xl border border-dashed border-[var(--glass-border)]">
                                <p className="text-sm font-bold text-[var(--text-muted)] italic">Aucun sprint défini pour ce PI ({activePI}).</p>
                            </div>
                        ) : (
                            <table className="min-w-full text-left text-sm text-[var(--text-muted)] dark:text-[var(--text-muted)]">
                                <thead className="bg-[var(--body-bg)] dark:bg-slate-800 border-b border-[var(--glass-border)] dark:border-slate-700 sticky top-0">
                                    <tr>
                                        <th className="py-3 px-4 font-bold text-[var(--text-muted)] dark:text-slate-300 uppercase tracking-wider text-[11px]">Itération</th>
                                        <th className="py-3 px-4 font-bold text-[var(--text-muted)] dark:text-slate-300 uppercase tracking-wider text-[11px] text-right">Jours</th>
                                        <th className="py-3 px-4 font-bold text-[var(--text-muted)] dark:text-slate-300 uppercase tracking-wider text-[11px]">Période</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredSprints.map((s, idx) => {
                                        const debut = s.date_debut || "";
                                        const fin = s.date_fin || "";
                                        const joursCalcules = (debut && fin) ? getWorkingDays(debut, fin, 'France', holidays) : 0;
                                        const formatDateFr = (dateStr) => {
                                            if (!dateStr) return "";
                                            const p = dateStr.split('-');
                                            return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : dateStr;
                                        };
                                        
                                        return (
                                            <tr key={idx} className="border-b border-[var(--glass-border)] dark:border-slate-800 hover:bg-[var(--body-bg)] dark:hover:bg-slate-800/50 transition-colors">
                                                <td className="py-3 px-4 font-medium text-[var(--text-main)]">Sprint {s.numero_iteration}</td>
                                                <td className="py-3 px-4 font-black text-[var(--accent)] dark:text-[var(--accent)] text-right num-align">{joursCalcules} j</td>
                                                <td className="py-3 px-4 text-xs font-semibold text-[var(--text-muted)] dark:text-[var(--text-muted)] tracking-tight">
                                                    {debut ? formatDateFr(debut) : <span className="text-red-400 italic font-normal">Non définie</span>} 
                                                    <span className="text-[var(--text-muted)] dark:text-[var(--text-muted)] mx-1">au</span> 
                                                    {fin ? formatDateFr(fin) : <span className="text-red-400 italic font-normal">Non définie</span>}
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        )}
					</div>

                    <div className="mt-8 pt-6 border-t border-[var(--glass-border)] space-y-4">
                        <h4 className="text-xs font-black text-[var(--text-muted)] uppercase tracking-[0.2em]">Cycle de vie du PI</h4>
                        
                        {activePIStatus === 'PLANIFICATION' ? (
                            <div className="bg-blue-50 border border-blue-200 p-4 rounded-xl flex items-start gap-3">
                                <i className="fa-solid fa-rocket text-blue-600 mt-1"></i>
                                <div className="flex-1">

	// =========================================================================
	// 🌍 UTILITAIRES GLOBAUX : Fonctions accessibles partout

	// Calcul intelligent des jours ouvrés par pays
	const getWorkingDays = (startDate, endDate, memberCountry, holidaysList = []) => {
		if(!startDate || !endDate || startDate === "" || endDate === "") return 0;
		let count = 0; 
		let curDate = new Date(startDate); 
		let end = new Date(endDate);
		const mCountry = String(memberCountry || 'France').trim();

		while (curDate <= end) {
			let dayOfWeek = curDate.getDay();
			if (dayOfWeek !== 0 && dayOfWeek !== 6) { // Hors week-end
				const dateStr = curDate.toISOString().split('T')[0];
				
				const isHoliday = holidaysList.some(h => {
					if (h.date !== dateStr) return false;
					if (h.country === 'Tous') return true; // Commun (Monde)
					if (h.country === mCountry) return true; // Match exact (ex: France, Esp Valence)
					// L'astuce pour l'Espagne globale :
					if (h.country === 'Espagne' && mCountry.toLowerCase().includes('esp')) return true;
					return false;
				});

				if (!isHoliday) count++; 
			}
			curDate.setDate(curDate.getDate() + 1);
		}
		return count;
	};

	// Mapping des drapeaux
	const getCountryFlagUrl = (pays) => {
		if (!pays || pays === 'Tous') return null; 
		const p = String(pays).toLowerCase();
		if (p.includes('valence')) return 'drapeau_esp.png';
		if (p.includes('murcie')) return 'drapeau_esp.png';
		if (p.includes('esp')) return 'drapeau_esp.png';
		if (p.includes('france') || p.includes('fr')) return 'drapeau_fr.png';
		return 'drapeau_fr.png'; // Fallback
		}
	/**
	 * CAPACITY PLANNER - APPLICATION CORE
	 * -------------------------------------------------------------------------
	 * @project     Capacity Manager Enterprise
	 * @version     4.3.0 "Multi-PI Edition"
	 * @stack       React 18, TailwindCSS 3, PHP 7.4+, PostgreSQL 9.1.2
	 * 
	 * SOMMAIRE DES FONCTIONNALITÉS :
	 * 1. DESIGN SYSTEM : Glassmorphism & Elevation-based Dark Mode.
	 * 2. NAVIGATION : Système de "Vue Active" avec filtrage dynamique par PI.
	 * 3. CYCLE DE VIE : Gestion des statuts (PLANIFICATION, EN COURS, ARCHIVE).
	 * 4. MOTEUR CAPACITAIRE : Calcul temps réel de l'offre humaine (Net Capacity).
	 * 5. ARCHIVAGE : Verrouillage en lecture seule pour les PI clos.
	 * -------------------------------------------------------------------------
	 */
	function App() {
		/**
		 * ---------------------------------------------------------------------
		 * 1. ÉTATS GLOBAUX (STATE)
		 * ---------------------------------------------------------------------
		 */
		const [user, setUser] = useState(() => {
			const saved = localStorage.getItem('capPlanner_user');
			return saved ? JSON.parse(saved) : null;
		});

        const [darkMode, setDarkMode] = useState(() => {
            const saved = localStorage.getItem('capPlanner_darkMode');
            return saved === 'true' || (window.matchMedia('(prefers-color-scheme: dark)').matches && saved === null);
        });

        useEffect(() => {
            if (darkMode) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
            localStorage.setItem('capPlanner_darkMode', darkMode);
        }, [darkMode]);

		const [activeTab, setActiveTab] = useState('dashboard'); 
		const [teamSubTab, setTeamSubTab] = useState('BUILD'); 
		const [activePI, setActivePI] = useState(() => localStorage.getItem('capPlanner_activePI') || 'PI 2026.2');
		const [isDropdownOpen, setIsDropdownOpen] = useState(false);
		
		// Anomalies transverses sauvegardées dans le localStorage par PI
		const [currentAnomalies, setCurrentAnomalies] = useState(0);

        // Effet pour synchroniser les anomalies quand le PI change
        useEffect(() => {
            const saved = localStorage.getItem(`capPlanner_ano_${activePI}`);
            setCurrentAnomalies(saved ? Number(saved) : 0);
            localStorage.setItem('capPlanner_activePI', activePI);
        }, [activePI]);

		useEffect(() => { localStorage.setItem(`capPlanner_ano_${activePI}`, currentAnomalies); }, [currentAnomalies, activePI]);
		
		const [dbStatus, setDbStatus] = useState({ state: 'checking', message: 'Vérification...', showToast: false });
		const [isHelpModalOpen, setIsHelpModalOpen] = useState(false);
		const [memberToDelete, setMemberToDelete] = useState(null);
		const [historyToDelete, setHistoryToDelete] = useState(null);
		
		// Système de Toaster global pour les retours utilisateurs
		const [toast, setToast] = useState({ visible: false, type: 'success', title: '', message: '' });
		const showToast = (type, title, message) => {
			setToast({ visible: true, type, title, message });
			setTimeout(() => setToast(prev => ({ ...prev, visible: false })), 4000);
		};
		
		const [historicalData, setHistoricalData] = useState([]);
		const [newHist, setNewHist] = useState({ pi: '', total: '', build: '', mco: '', tra: '', anomalies: '', apollo: '', disco: '', allstars: '', ordre: '' });

		/**
		 * ---------------------------------------------------------------------
		 * 2. CHARGEMENT DES DONNÉES (API)
		 * ---------------------------------------------------------------------
		 */
		useEffect(() => {
			fetch('api_historique.php?t=' + new Date().getTime())
				.then(res => res.text())
				.then(text => {
					try {
						const cleanText = text.trim().replace(/^\uFEFF/, '');
						const data = JSON.parse(cleanText);
						if (Array.isArray(data)) setHistoricalData(data);
					} catch (e) { console.error("Erreur parsing historique", e); }
				})
				.catch(err => console.error("Erreur réseau historique"));
		}, []); 

		// Permissions RBAC (Role-Based Access Control)
		const isAppAdmin = user?.role === 'ADMIN';
		const isTeamAdmin = useCallback((teamDbId) => { return isAppAdmin || (user?.role === 'SM' && user?.equipes_ids?.includes(Number(teamDbId))); }, [user, isAppAdmin]);
		const isTeamContributor = useCallback((teamDbId) => { return isTeamAdmin(teamDbId) || (user?.role === 'CONTRIBUTEUR' && user?.equipes_ids?.includes(Number(teamDbId))); }, [user, isTeamAdmin]);

		const safeNum = useCallback((val, fallback = 0) => {
			if (val === undefined || val === null || val === '') return fallback;
			if (typeof val === 'object') return fallback;
			const parsed = parseFloat(String(val).replace(',', '.'));
			return isNaN(parsed) ? fallback : parsed;
		}, []);

		useEffect(() => {
			if (dbStatus.showToast && dbStatus.state === 'success') {
				const timer = setTimeout(() => { setDbStatus(prev => ({ ...prev, showToast: false })); }, 3000);
				return () => clearTimeout(timer);
			}
		}, [dbStatus.showToast, dbStatus.state]);

		const [piList, setPiList] = useState([]);

            const newVal = isCurrentlyAssigned ? 0 : 1;

        const submitAddMember = (team_db_id) => {

		const currentPiSprints = useMemo(() => {
			let sp = Array.isArray(sprints) ? sprints.filter(s => {
                const sCode = String(s.pi_code || '').trim().toLowerCase();
                const aCode = String(activePI || '').trim().toLowerCase();
                return sCode === aCode || sCode === 'pi ' + aCode || aCode === 'pi ' + sCode;
            }).sort((a, b) => a.numero_iteration - b.numero_iteration) : [];

			if (sp.length === 0) sp = Array.from({ length: safeNum(piConfig.iterations, 4) }, (_, i) => ({ numero_iteration: i + 1, date_debut: '', date_fin: '', isFallback: true }));

		const roundToNearestHalf = (num) => { const n = safeNum(num, 0); return Math.round(n * 2) / 2; };
		
		/**
		 * ---------------------------------------------------------------------
		 * 4. MOTEUR CAPACITAIRE (CALCUL DE L'OFFRE HUMAINE)
		 * ---------------------------------------------------------------------
		 */
		const computedTeams = useMemo(() => {
			const nonCapacityRoles = ['SM', 'PO', 'PPO', 'RT'];         
            const roleHierarchy = { 'SM': 1, 'PO': 2, 'PPO': 3, 'RT': 4, 'DEV': 5 };

			return teams.map(team => {
				const currentVFactor = safeNum(team.velocityFactor, 0.46); 
				const sprintTotals = {}; const mcoSprintTotals = {}; 
				currentPiSprints.forEach(s => { sprintTotals[s.numero_iteration] = 0; mcoSprintTotals[s.numero_iteration] = 0; });
				
				let membersWithCap = team.members.map(m => {
					const isNonCapacity = nonCapacityRoles.includes(String(m.role).toUpperCase());
					
                    let memberTotalCap = 0; let memberMcoTotalCap = 0; let memberTraTotalCap = 0; 
                    const sprintCapacities = {}; const mcoCapacities = {}; const traCapacities = {}; const sprintPresence = {}; 

					currentPiSprints.forEach(sprint => {
						const iter = sprint.numero_iteration;
						const abs = safeNum(m.absences?.[iter], 0); 
						const isMcoAssigned = safeNum(m.mco?.[iter], 0) === 1; 
                        const traWeeks = safeNum(m.tra?.[iter], 0);
                        const traDays = traWeeks * 5; 

						const fallbackDays = safeNum(piConfig.daysPerIteration, 15);
						const totalWorkingDays = sprint.isFallback ? fallbackDays : safeNum(getWorkingDays(sprint.date_debut, sprint.date_fin, m.pays, holidays), 0);
						const presenceDays = Math.max(0, totalWorkingDays - abs);
						
						const sprintDaysBuild = isMcoAssigned ? 0 : Math.max(0, presenceDays - traDays);
						const sprintCapBuild = isNonCapacity ? 0 : roundToNearestHalf(sprintDaysBuild * currentVFactor);
						memberTotalCap += sprintCapBuild; sprintCapacities[iter] = sprintCapBuild; sprintTotals[iter] += sprintCapBuild; 
						
						const sprintCapMco = (isNonCapacity || !isMcoAssigned) ? 0 : roundToNearestHalf(presenceDays * currentVFactor);
						memberMcoTotalCap += sprintCapMco; mcoCapacities[iter] = sprintCapMco; mcoSprintTotals[iter] += sprintCapMco;
						
                        const sprintCapTra = (isNonCapacity || isMcoAssigned) ? 0 : roundToNearestHalf(traDays * currentVFactor);
                        memberTraTotalCap += sprintCapTra; traCapacities[iter] = sprintCapTra;
                        sprintPresence[iter] = presenceDays; 
					});
					
					return { ...m, isNonCapacity, netCapacity: memberTotalCap, memberMcoTotalCap, memberTraTotalCap, sprintCapacities, mcoCapacities, traCapacities, sprintPresence };
				});
				
				Object.keys(sprintTotals).forEach(k => sprintTotals[k] = roundToNearestHalf(sprintTotals[k]));
				Object.keys(mcoSprintTotals).forEach(k => mcoSprintTotals[k] = roundToNearestHalf(mcoSprintTotals[k]));
				
                const totalCapacity = membersWithCap.reduce((sum, m) => sum + safeNum(m.netCapacity, 0), 0);
				const totalMcoCapacity = membersWithCap.reduce((sum, m) => sum + safeNum(m.memberMcoTotalCap, 0), 0);
				const totalTraCapacity = membersWithCap.reduce((sum, m) => sum + safeNum(m.memberTraTotalCap, 0), 0);
				const committedLoadSafe = safeNum(team.committedLoad, 0);

                const sortedMembers = membersWithCap.sort((a, b) => {
                    const weightA = roleHierarchy[String(a.role).toUpperCase()] || 99;
                    const weightB = roleHierarchy[String(b.role).toUpperCase()] || 99;
                    if (weightA !== weightB) return weightA - weightB;
                    return String(a.name).localeCompare(String(b.name));
                });

				return { 
                    ...team, members: sortedMembers, totalCapacity, totalMcoCapacity, totalTraCapacity, sprintTotals, mcoSprintTotals, 
                    isOverload: committedLoadSafe > totalCapacity, 
                    engagementRate: totalCapacity > 0 ? Math.round((committedLoadSafe / totalCapacity) * 100) : 0 
                };
			});
		}, [teams, piConfig, currentPiSprints, holidays, safeNum]);

		/**
		 * ---------------------------------------------------------------------
		 * 5. CALCULS GLOBAUX (LINÉARITÉ & DASHBOARD)
		 * ---------------------------------------------------------------------
		 */
		const { pctTime, isInitialPhase, daysElapsed } = useMemo(() => {
            // On utilise les dates de piConfig (définies globalement) ou le fallback sur les sprints
            const startDate = piConfig.startDate ? new Date(piConfig.startDate) : (currentPiSprints[0]?.date_debut ? new Date(currentPiSprints[0].date_debut) : null);
            const endDate = piConfig.endDate ? new Date(piConfig.endDate) : (currentPiSprints[currentPiSprints.length - 1]?.date_fin ? new Date(currentPiSprints[currentPiSprints.length - 1].date_fin) : null);
            
            if (!startDate || !endDate) return { pctTime: 0, isInitialPhase: false };
            
            const now = new Date();
            const totalDuration = endDate - startDate;
            const elapsed = now - startDate;
            const diffDays = Math.floor(elapsed / (1000 * 60 * 60 * 24));
            
            return {
                pctTime: Math.min(Math.max((elapsed / totalDuration) * 100, 0), 100) || 0,
                daysElapsed: diffDays,
                isInitialPhase: diffDays <= 5 // Règle métier : Suspendre le Say/Do les 5 premiers jours ouvrés
            };
        }, [currentPiSprints, piConfig.startDate, piConfig.endDate]);

		const globalStats = useMemo(() => {
			const totalNetCap = computedTeams.reduce((sum, t) => sum + safeNum(t.totalCapacity, 0), 0);
			const totalMcoCap = computedTeams.reduce((sum, t) => sum + safeNum(t.totalMcoCapacity, 0), 0);
            const totalTraCap = computedTeams.reduce((sum, t) => sum + safeNum(t.totalTraCapacity, 0), 0);
            
            // La capacité brute est la somme de tout ce que le train peut produire (Build + MCO + TRA)
			const totalGrossCap = totalNetCap + totalMcoCap + totalTraCap;

			const totalLoadBuild = computedTeams.reduce((sum, t) => sum + safeNum(t.committedLoad, 0), 0);
			const totalRealise = computedTeams.reduce((sum, t) => sum + safeNum(t.realise, 0), 0);
			const totalMco = totalMcoCap; 
			const totalTra = totalTraCap;

		/**

		const renderTeams = () => {
		   
		   const formatSprintDates = (start, end) => {
                if (!start || !end) return null;
                const fmt = (d) => {
                    const p = d.split('-');
                    return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : d;
                };
                return `${fmt(start)} - ${fmt(end)}`;
            };
			
			const activeSprints = currentPiSprints.filter(s => !s.isFallback && s.date_debut && s.date_fin);
            let piHolidays = [];
            if (activeSprints.length > 0) {
                const minDate = activeSprints[0].date_debut;
                const maxDate = activeSprints[activeSprints.length - 1].date_fin;
                piHolidays = holidays
                    .filter(h => h.date >= minDate && h.date <= maxDate)
                    .sort((a, b) => new Date(a.date) - new Date(b.date));
            }

            const allMcoMembers = [];
            let unifiedTotalMcoCapacity = 0;
            const unifiedMcoSprintTotals = {};
            
            if (currentPiSprints && currentPiSprints.length > 0) {
                currentPiSprints.forEach(s => { unifiedMcoSprintTotals[s.numero_iteration] = 0; });
            }

            computedTeams.forEach(team => {
                const teamMcoMembers = team.members.filter(m => !m.isNonCapacity && currentPiSprints.some(sp => Number(m.mco?.[sp.numero_iteration]) === 1));
                teamMcoMembers.forEach(m => {
                    allMcoMembers.push({ ...m, originalTeam: team.name });
                    unifiedTotalMcoCapacity += Number(m.memberMcoTotalCap || 0);
                    currentPiSprints.forEach(sp => { unifiedMcoSprintTotals[sp.numero_iteration] += Number(m.mcoCapacities?.[sp.numero_iteration] || 0); });
                });
            });
            
            Object.keys(unifiedMcoSprintTotals).forEach(k => { unifiedMcoSprintTotals[k] = Math.round(Number(unifiedMcoSprintTotals[k]) * 2) / 2; });
            unifiedTotalMcoCapacity = Math.round(unifiedTotalMcoCapacity * 2) / 2;

            const unifiedTraSprintTotals = {};

            if (currentPiSprints && currentPiSprints.length > 0) {

                    currentPiSprints.some(sp => Number(m.tra?.[sp.numero_iteration]) > 0)
                );

                    showToast('error', 'Champs incomplets', 'Le Code PI et le Total sont obligatoires.'); 
                    return; 
                }
				
                const payload = {
					pi: newHist.pi, 
                    total: safeNum(newHist.total), 
                    build: safeNum(newHist.build), 
                    mco: newHist.mco === '' ? null : safeNum(newHist.mco), 
                    tra: newHist.tra === '' ? null : safeNum(newHist.tra),

                    ordre: safeNum(newHist.ordre) || historicalData.length + 1,

                        apollo: newHist.apollo === '' ? null : safeNum(newHist.apollo), 
                        disco: newHist.disco === '' ? null : safeNum(newHist.disco), 
                        allstars: newHist.allstars === '' ? null : safeNum(newHist.allstars) 
                    }
				};

				fetch('api_historique.php', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                })
				.then(res => res.json())
				.then(data => {
					if(data.status === 'success') {
						fetch('api_historique.php?t=' + new Date().getTime()).then(r => r.json()).then(setHistoricalData);

					fetch('api_historique.php?t=' + new Date().getTime()).then(r => r.json()).then(setHistoricalData); 
                    showToast('success', 'Suppression réussie', `L'historique du ${historyToDelete} a été effacé.`);

                                             <div className="mt-3 pt-3 border-t border-[var(--glass-border)]">
                                                 <div className="flex gap-2 p-1 bg-[var(--body-bg)] rounded-xl border border-[var(--glass-border)]">
                                                     <input 
                                                         type="text" 
                                                         placeholder="Nom du nouveau PI..." 
                                                         value={newPiNameInput}
                                                         onChange={(e) => setNewPiNameInput(e.target.value)}
                                                         className="flex-1 bg-transparent border-none text-[10px] font-bold text-[var(--text-main)] px-2 outline-none placeholder:text-[var(--text-muted)]/50"
                                                     />
                                                     <button 
                                                         onClick={() => handleCreatePI(newPiNameInput)}
                                                         className="w-8 h-8 rounded-lg bg-[var(--accent)] text-white flex items-center justify-center hover:scale-105 active:scale-95 transition-all shadow-lg shadow-[var(--accent)]/20"
                                                     >
                                                         <i className="fa-solid fa-plus text-xs"></i>
                                                     </button>
                                                 </div>
                                             </div>
                                         )}
                                     </div>
                                 )}
                             </div>
                         </div>

 						<div className="flex items-center gap-5">
                            <div className="flex items-center gap-2 bg-[var(--card-bg)]/40 px-3 py-1.5 rounded-full border border-white/60 shadow-inner">
                                <div className={`w-2 h-2 rounded-full ${dbStatus.state === 'success' ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]' : 'bg-amber-500 animate-pulse'}`}></div>
                                <span className="text-[10px] font-black text-[var(--text-muted)] uppercase tracking-tight">{dbStatus.state === 'success' ? 'System Live' : 'Connecting...'}</span>
                            </div>

							<div className="flex items-center gap-3">
                                <button onClick={() => setDarkMode(!darkMode)} className="w-10 h-10 flex items-center justify-center rounded-xl bg-[var(--card-bg)]/50 dark:bg-slate-800 text-[var(--text-muted)] dark:text-amber-400 hover:text-[var(--accent)] dark:hover:text-amber-300 hover:bg-[var(--card-bg)] dark:hover:bg-slate-700 shadow-sm border border-white/60 dark:border-slate-700 transition-all" title="Basculer le thème">
                                    <i className={`fa-solid ${darkMode ? 'fa-sun' : 'fa-moon'} text-lg`}></i>
                                </button>

								<button onClick={() => setIsHelpModalOpen(true)} className="w-10 h-10 flex items-center justify-center rounded-xl bg-[var(--card-bg)]/50 dark:bg-slate-800 text-[var(--text-muted)] dark:text-slate-300 hover:text-[var(--accent)] hover:bg-[var(--card-bg)] dark:hover:bg-slate-700 shadow-sm border border-white/60 dark:border-slate-700 transition-all">
                                    <i className="fa-solid fa-circle-info text-lg"></i>
                                </button>
                                
                                <div className="h-10 w-px bg-[var(--glass-border)] mx-1"></div>

                                <div className="text-right hidden sm:block">
                                    <p className="text-xs font-black text-[var(--text-main)] uppercase leading-none">{user?.login || 'User'}</p>
                                    <p className="text-[9px] text-[var(--accent)] font-bold uppercase tracking-tighter mt-1">{user?.role || 'Guest'}</p>
                                </div>

                                <button onClick={() => { setUser(null); localStorage.removeItem('capPlanner_user'); window.location.reload(); }} 
                                        className="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-900 text-white hover:bg-red-600 transition-all shadow-lg shadow-slate-200">
                                    <i className="fa-solid fa-power-off text-sm"></i>
                                </button>
                            </div>
						</div>
					</div>

                    {/* 🧭 NAVIGATION INTERNE (ONGLETS GLASS) */}
                    <div className="max-w-7xl mx-auto px-6 pb-4">
                        <nav className="flex gap-2 p-1.5 bg-[var(--glass-border)]/30 rounded-2xl border border-white/40 w-fit backdrop-blur-md">
                            {[
                                { id: 'dashboard', label: 'Overview', icon: 'fa-chart-pie' },
                                { id: 'teams', label: 'Teams Board', icon: 'fa-users' },
                                { id: 'sprints', label: 'Calendar', icon: 'fa-calendar-week', admin: true },
                                { id: 'config', label: 'Settings', icon: 'fa-gear', admin: true }
                            ].map(tab => (
                                (!tab.admin || isAppAdmin) && (
                                    <button 
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)} 
                                        className={`px-5 py-2.5 rounded-xl text-xs font-black uppercase tracking-widest flex items-center gap-2.5 transition-all duration-300 ${activeTab === tab.id ? 'bg-[var(--card-bg)] text-[var(--accent)] shadow-md translate-y-[-1px]' : 'text-[var(--text-muted)] hover:text-[var(--text-main)] hover:bg-[var(--card-bg)]/50'}`}
                                    >
                                        <i className={`fa-solid ${tab.icon} ${activeTab === tab.id ? 'scale-110' : 'opacity-70'}`}></i>
                                        {tab.label}
                                    </button>
                                )
                            ))}
                        </nav>
                    </div>
				</header>

                {/* 📝 CONTENU PRINCIPAL */}
				<main className="max-w-7xl mx-auto px-6 py-10 flex-1 w-full fade-in-up">
					{activeTab === 'dashboard' && renderDashboard()}
					{activeTab === 'teams' && renderTeams()}
					{activeTab === 'config' && isAppAdmin && renderConfig()}
					{activeTab === 'sprints' && isAppAdmin && (
                        <SettingsModule 
                            activePI={activePI} 
                            holidays={holidays} 
                            onShowToast={showToast} 
                            isArchived={isArchived}
                            handleStartPI={handleStartPI}
                            handleClosePI={handleClosePI}
                            isAppAdmin={isAppAdmin}
                            activePIStatus={activePIStatus}
                            sprints={sprints}
                            fetchSprints={fetchSprints}
                        />
                    )}
				</main>

                {/* 🆘 MODAL D'AIDE ET MATRICE DES DROITS (STANDARTISÉE) */}
                {isHelpModalOpen && (
                    <div className="fixed inset-0 bg-slate-900/60 dark:bg-black/60 backdrop-blur-md flex items-center justify-center z-[60] p-4 animate-in fade-in" onClick={() => setIsHelpModalOpen(false)}>
                        <div className="glass-card rounded-[40px] shadow-2xl max-w-2xl w-full overflow-hidden transform transition-all animate-in zoom-in-95 relative" onClick={e => e.stopPropagation()}>
                            
                            <div className="p-8 pb-4 flex justify-between items-center">
                                <div>
                                    <h2 className="text-2xl font-[900] text-[var(--text-main)] dark:text-white tracking-tight flex items-center gap-3">
                                        <div className="w-10 h-10 rounded-xl bg-[var(--accent)] text-white flex items-center justify-center shadow-lg shadow-[var(--accent)]/20 dark:shadow-none">
                                            <i className="fa-solid fa-shield-halved"></i>
                                        </div>
                                        Rights <span className="text-gradient">Matrix</span>
                                    </h2>
                                    <p className="text-[10px] font-black text-[var(--text-muted)] dark:text-[var(--text-muted)] uppercase tracking-[0.2em] mt-2 ml-1">Access Control & Permissions</p>
                                </div>
                                <button onClick={() => setIsHelpModalOpen(false)} className="w-12 h-12 flex items-center justify-center rounded-2xl bg-[var(--accent-muted)] dark:bg-slate-800 text-[var(--text-muted)] hover:text-red-500 transition-all">
                                    <i className="fa-solid fa-xmark text-xl"></i>
                                </button>
                            </div>

                            <div className="p-8 pt-4 space-y-5 max-h-[65vh] overflow-y-auto custom-scrollbar">
                                {/* Administrateur */}
                                <div className="bg-[var(--card-bg)]/40 dark:bg-[var(--card-bg)]/5 p-6 rounded-3xl border border-white/60 dark:border-white/10 shadow-sm group hover:border-[var(--accent)] transition-colors">
                                    <div className="flex items-center justify-between mb-4">
                                        <h3 className="font-black text-lg text-[var(--text-main)] dark:text-slate-100 flex items-center gap-2">
                                            👑 Administrateur
                                        </h3>
                                        <Badge variant="success" className="text-[9px] uppercase font-black tracking-widest px-3 py-1">FULL ACCESS</Badge>
                                    </div>
                                    <ul className="grid grid-cols-1 md:grid-cols-2 gap-3 text-xs font-semibold text-[var(--text-muted)] dark:text-[var(--text-muted)]">
                                        <li className="flex items-start gap-2"><i className="fa-solid fa-circle-check text-emerald-500 mt-0.5"></i> Configuration totale du PI</li>
                                        <li className="flex items-start gap-2"><i className="fa-solid fa-circle-check text-emerald-500 mt-0.5"></i> Gestion des Jours Fériés</li>
                                        <li className="flex items-start gap-2"><i className="fa-solid fa-circle-check text-emerald-500 mt-0.5"></i> Édition universelle des données</li>
                                        <li className="flex items-start gap-2"><i className="fa-solid fa-circle-check text-emerald-500 mt-0.5"></i> Archivage Historique</li>
                                    </ul>
                                </div>

                                {/* Scrum Master */}
                                <div className="bg-[var(--card-bg)]/40 dark:bg-[var(--card-bg)]/5 p-6 rounded-3xl border border-white/60 dark:border-white/10 shadow-sm group hover:border-purple-400 transition-colors">
                                    <div className="flex items-center justify-between mb-4">
                                        <h3 className="font-black text-lg text-[var(--text-main)] dark:text-slate-100 flex items-center gap-2">
                                            🛡️ Scrum Master
                                        </h3>
                                        <span className="bg-purple-100 dark:bg-purple-900/30 text-purple-700 dark:text-purple-400 text-[9px] font-black uppercase tracking-widest px-3 py-1 rounded-full border border-purple-200 dark:border-purple-800">TEAM ADMIN</span>
                                    </div>
                                    <ul className="grid grid-cols-1 md:grid-cols-2 gap-3 text-xs font-semibold text-[var(--text-muted)] dark:text-[var(--text-muted)]">
                                        <li className="flex items-start gap-2"><i className="fa-solid fa-check text-purple-500 mt-0.5"></i> Édition de toute son équipe</li>
                                        <li className="flex items-start gap-2"><i className="fa-solid fa-check text-purple-500 mt-0.5"></i> Saisie Charge & Réalisé</li>
                                        <li className="flex items-start gap-2"><i className="fa-solid fa-check text-purple-500 mt-0.5"></i> Pilotage MCO / TRA</li>
                                        <li className="flex items-start gap-2"><i className="fa-solid fa-circle-xmark text-slate-300 dark:text-[var(--text-muted)] mt-0.5"></i> Pas d'accès Configuration</li>
                                    </ul>
                                </div>

                                {/* Contributeur */}
                                <div className="bg-[var(--card-bg)]/40 dark:bg-[var(--card-bg)]/5 p-6 rounded-3xl border border-white/60 dark:border-white/10 shadow-sm group hover:border-amber-400 transition-colors">
                                    <div className="flex items-center justify-between mb-4">
                                        <h3 className="font-black text-lg text-[var(--text-main)] dark:text-slate-100 flex items-center gap-2">
                                            ✍️ Contributeur
                                        </h3>
                                        <span className="bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400 text-[9px] font-black uppercase tracking-widest px-3 py-1 rounded-full border border-amber-200 dark:border-amber-800">MEMBER</span>
                                    </div>
                                    <ul className="grid grid-cols-1 md:grid-cols-2 gap-3 text-xs font-semibold text-[var(--text-muted)] dark:text-[var(--text-muted)]">
                                        <li className="flex items-start gap-2"><i className="fa-solid fa-user-pen text-amber-500 mt-0.5"></i> Édition propre ligne (ABS)</li>
                                        <li className="flex items-start gap-2"><i className="fa-solid fa-eye text-amber-500 mt-0.5"></i> Consultation Dashboard</li>
                                        <li className="flex items-start gap-2"><i className="fa-solid fa-eye text-amber-500 mt-0.5"></i> Consultation Boards</li>
                                    </ul>
                                </div>
                            </div>

                            <div className="p-8 pt-2">
                                <button 
                                    onClick={() => setIsHelpModalOpen(false)} 
                                    className="w-full btn-primary-gradient text-white font-black py-5 rounded-[20px] transition-all text-sm tracking-widest uppercase shadow-xl"
                                >
                                    Acknowledgment
                                </button>
                            </div>
                        </div>
                    </div>
                )}

                {/* 🗑️ MODALE DE CONFIRMATION DE SUPPRESSION (MEMBRE) */}
                {memberToDelete && (
                    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-in fade-in">
                        <div className="bg-[var(--card-bg)] rounded-2xl shadow-2xl max-w-sm w-full overflow-hidden transform transition-all animate-in zoom-in-95 p-6 text-center">
                            <div className="w-16 h-16 rounded-full bg-red-100 text-red-600 flex items-center justify-center mx-auto mb-4 text-3xl shadow-inner">
                                <i className="fa-solid fa-user-slash"></i>
                            </div>
                            <h3 className="text-xl font-black text-[var(--text-main)] mb-2">Supprimer le membre ?</h3>
                            <p className="text-sm text-[var(--text-muted)] font-medium mb-8 leading-relaxed">
                                Êtes-vous sûr de vouloir retirer <strong>{memberToDelete.nom}</strong> de la base ? <br/>
                                <span className="text-[11px] text-red-500 font-bold uppercase tracking-tighter mt-2 inline-block">Cette action supprimera également ses données de capacité.</span>
                            </p>
                            <div className="flex gap-3">
                                <button onClick={() => setMemberToDelete(null)} className="flex-1 px-4 py-2.5 text-sm font-bold text-[var(--text-muted)] hover:bg-[var(--accent-muted)] rounded-xl transition-colors">
                                    ANNULER
                                </button>
                                <button onClick={confirmDeleteMember} className="flex-1 px-4 py-2.5 text-sm font-black bg-red-600 text-white hover:bg-red-700 rounded-xl shadow-lg shadow-red-100 transition-all">
                                    SUPPRIMER
                                </button>
                            </div>
                        </div>
                    </div>
                )}

                {/* 🗑️ MODALE DE CONFIRMATION DE SUPPRESSION (HISTORIQUE) */}
                {historyToDelete && (
                    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[70] p-4 animate-in fade-in">
                        <div className="glass-card rounded-[40px] shadow-2xl max-w-sm w-full overflow-hidden transform transition-all animate-in zoom-in-95 p-8 text-center">
                            <div className="w-16 h-16 rounded-full bg-red-100 text-red-600 flex items-center justify-center mx-auto mb-6 text-3xl shadow-inner">
                                <i className="fa-solid fa-database"></i>
                            </div>
                            <h3 className="text-2xl font-[900] text-[var(--text-main)] mb-2">Effacer le PI ?</h3>
                            <p className="text-sm text-[var(--text-muted)] font-medium mb-8 leading-relaxed">
                                Êtes-vous sûr de vouloir supprimer définitivement le <strong>PI {historyToDelete}</strong> de l'historique ?
                            </p>
                            <div className="flex gap-4">
                                <button onClick={() => setHistoryToDelete(null)} className="flex-1 px-4 py-3 text-sm font-bold text-[var(--text-muted)] hover:bg-[var(--accent-muted)] rounded-2xl transition-all">
                                    ANNULER
                                </button>
                                <button onClick={confirmDeleteHistory} className="flex-1 px-4 py-3 text-sm font-black bg-red-600 text-white hover:bg-red-700 rounded-2xl shadow-lg shadow-red-100 transition-all">
                                    SUPPRIMER
                                </button>
                            </div>
                        </div>
                    </div>
                )}

                {/* 🍞 SYSTEME DE TOAST (NOTIFICATIONS) */}
                {toast.visible && (
                    <div className="fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] animate-in fade-in slide-in-from-bottom-4 duration-300">
                        <div className={`glass-card px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-4 border-l-4 ${toast.type === 'success' ? 'border-l-emerald-500' : 'border-l-red-500'} min-w-[320px]`}>
                            <div className={`w-10 h-10 rounded-full flex items-center justify-center shrink-0 ${toast.type === 'success' ? 'bg-emerald-100 text-emerald-600' : 'bg-red-100 text-red-600'}`}>
                                <i className={`fa-solid ${toast.type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation'} text-lg`}></i>
                            </div>
                            <div className="flex flex-col">
                                <span className="text-sm font-black text-[var(--text-main)] uppercase tracking-tight">{toast.title}</span>
                                <span className="text-xs text-[var(--text-muted)] font-medium">{toast.message}</span>
                            </div>
                            <button onClick={() => setToast(p => ({...p, visible: false}))} className="ml-auto text-[var(--text-muted)] hover:text-[var(--text-muted)] transition-colors">
                                <i className="fa-solid fa-xmark"></i>
                            </button>
                        </div>
                    </div>
                )}
			</div>
		);
	}
	
    // =========================================================================
    // 🏁 INITIALISATION REACT
    // =========================================================================
	const root = ReactDOM.createRoot(document.getElementById('root'));
	root.render(<App />);
</script>
</body>
</html>
